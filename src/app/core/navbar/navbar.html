<nav class="navbar">
  <div class="navbar-container">
    <a class="navbar-brand" routerLink="/">
      <img src="company-logo.svg" alt="Company Logo" class="navbar-logo">
      <h1 class="navbar-title">ERS</h1>
    </a>
    
    <div class="navbar-actions">
      @if (!isLoggedIn) {
        <a routerLink="/login" class="action-button primary">Login</a>
      }
      @if (isLoggedIn) {
        <button (click)="logout()" class="action-button">Logout</button>
      }
    </div>
  </div>
</nav>
